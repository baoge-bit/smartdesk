name: Release AlphaDesk

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            sidecar_triple: aarch64-apple-darwin
            python_arch: arm64
            rust_target: aarch64-apple-darwin
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            sidecar_triple: x86_64-apple-darwin
            python_arch: x64
            rust_target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ''
            sidecar_triple: x86_64-unknown-linux-gnu
            python_arch: x64
            rust_target: x86_64-unknown-linux-gnu
          - platform: windows-latest
            args: ''
            sidecar_triple: x86_64-pc-windows-msvc
            python_arch: x64
            rust_target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/alphadesk/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          architecture: ${{ matrix.python_arch }}
          cache: pip
          cache-dependency-path: engine/requirements-bundle.txt

      - name: Install system deps (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup engine
        shell: bash
        working-directory: engine
        run: |
          set -euo pipefail
          echo "Python arch: $(python -c 'import platform; print(platform.machine())')"

          python -m venv .venv
          if [ -f .venv/Scripts/activate ]; then
            source .venv/Scripts/activate
          else
            source .venv/bin/activate
          fi

          pip install -r requirements-bundle.txt pyinstaller
          pyinstaller alphadesk-engine.spec --noconfirm --clean

          echo "Sidecar binary arch:"
          file dist/alphadesk-engine* || true

      - name: Copy sidecar binary
        shell: bash
        env:
          SIDECAR_TRIPLE: ${{ matrix.sidecar_triple }}
        run: |
          set -euo pipefail
          mkdir -p apps/alphadesk/src-tauri/binaries
          shopt -s nullglob
          bins=(engine/dist/alphadesk-engine*)
          if [ ${#bins[@]} -eq 0 ]; then
            echo "PyInstaller output missing under engine/dist/" >&2
            ls -la engine/dist/ >&2 || true
            exit 1
          fi

          if [[ "$SIDECAR_TRIPLE" == *"windows"* ]]; then
            dest="apps/alphadesk/src-tauri/binaries/alphadesk-engine-${SIDECAR_TRIPLE}.exe"
          else
            dest="apps/alphadesk/src-tauri/binaries/alphadesk-engine-${SIDECAR_TRIPLE}"
          fi

          cp "${bins[0]}" "$dest"
          chmod +x "$dest" 2>/dev/null || true
          echo "Copied sidecar to $dest"
          file "$dest" || true
          ls -la apps/alphadesk/src-tauri/binaries/

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Configure macOS x86_64 cross-linker
        if: matrix.rust_target == 'x86_64-apple-darwin'
        shell: bash
        run: |
          SDKROOT=$(xcrun --sdk macosx --show-sdk-path)
          echo "SDKROOT=${SDKROOT}" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_X86_64_APPLE_DARWIN_LINKER=clang -arch x86_64 -isysroot ${SDKROOT} -Wl,-syslibroot,${SDKROOT}" >> "$GITHUB_ENV"
          echo "CC_x86_64_apple_darwin=clang -arch x86_64 -isysroot ${SDKROOT}" >> "$GITHUB_ENV"

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/alphadesk/src-tauri

      - name: Install frontend deps
        shell: bash
        working-directory: apps/alphadesk
        run: npm ci

      - name: Inject updater public key
        shell: bash
        working-directory: apps/alphadesk
        env:
          TAURI_SIGNING_PUBLIC_KEY: ${{ secrets.TAURI_SIGNING_PUBLIC_KEY }}
        run: |
          if [ -z "${TAURI_SIGNING_PUBLIC_KEY:-}" ]; then
            echo "No TAURI_SIGNING_PUBLIC_KEY secret — skipping pubkey injection"
            exit 0
          fi
          node <<'NODE'
          const fs = require('fs');
          const path = 'src-tauri/tauri.conf.json';
          const conf = JSON.parse(fs.readFileSync(path, 'utf8'));
          conf.plugins.updater.pubkey = process.env.TAURI_SIGNING_PUBLIC_KEY;
          fs.writeFileSync(path, JSON.stringify(conf, null, 2) + '\n');
          NODE

      - name: Prepare release notes
        id: notes
        shell: bash
        run: |
          BODY=$(sed "s/{{tag}}/${{ env.RELEASE_TAG }}/g" .github/release-template.md)
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          echo "$BODY" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/alphadesk
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: 'AlphaDesk ${{ env.RELEASE_TAG }}'
          releaseBody: ${{ steps.notes.outputs.body }}
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}