name: Release AlphaDesk

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          # Re-enable cache after committing apps/alphadesk/package-lock.json:
          # cache: npm
          # cache-dependency-path: apps/alphadesk/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: engine/requirements.txt

      - name: Install system deps (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup engine
        shell: bash
        run: |
          python -m venv engine/.venv
          source engine/.venv/bin/activate
          pip install -r engine/requirements.txt pyinstaller
          pyinstaller engine/alphadesk-engine.spec --noconfirm --clean

      - name: Copy sidecar binary
        shell: bash
        run: |
          mkdir -p apps/alphadesk/src-tauri/binaries
          if compgen -G "engine/dist/alphadesk-engine*" > /dev/null; then
            cp engine/dist/alphadesk-engine* apps/alphadesk/src-tauri/binaries/
          else
            echo "PyInstaller output missing under engine/dist/" >&2
            ls -la engine/dist/ >&2 || true
            exit 1
          fi
          ls -la apps/alphadesk/src-tauri/binaries/

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/alphadesk/src-tauri

      - name: Install frontend deps
        working-directory: apps/alphadesk
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi

      - name: Inject updater public key
        working-directory: apps/alphadesk
        env:
          TAURI_SIGNING_PUBLIC_KEY: ${{ secrets.TAURI_SIGNING_PUBLIC_KEY }}
        run: |
          if [ -z "${TAURI_SIGNING_PUBLIC_KEY:-}" ]; then
            echo "No TAURI_SIGNING_PUBLIC_KEY secret — skipping pubkey injection"
            exit 0
          fi
          node <<'NODE'
          const fs = require('fs');
          const path = 'src-tauri/tauri.conf.json';
          const conf = JSON.parse(fs.readFileSync(path, 'utf8'));
          conf.plugins.updater.pubkey = process.env.TAURI_SIGNING_PUBLIC_KEY;
          fs.writeFileSync(path, JSON.stringify(conf, null, 2) + '\n');
          NODE

      - name: Prepare release notes
        id: notes
        run: |
          BODY=$(sed "s/{{tag}}/${{ github.ref_name }}/g" .github/release-template.md)
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          echo "$BODY" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/alphadesk
          tagName: ${{ github.ref_name }}
          releaseName: 'AlphaDesk ${{ github.ref_name }}'
          releaseBody: ${{ steps.notes.outputs.body }}
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}